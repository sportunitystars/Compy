openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for Habit Tracker
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: habits
    description: Habit management
  - name: logs
    description: Daily habit logs
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/google:
    get:
      operationId: googleAuth
      tags: [auth]
      summary: Initiate Google OAuth flow
      responses:
        "302":
          description: Redirect to Google

  /auth/google/callback:
    get:
      operationId: googleAuthCallback
      tags: [auth]
      summary: Google OAuth callback
      responses:
        "302":
          description: Redirect after auth

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # HABITS
  /habits:
    get:
      operationId: listHabits
      tags: [habits]
      summary: List all habits for current user
      responses:
        "200":
          description: List of habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Habit"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createHabit
      tags: [habits]
      summary: Create a new habit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHabitBody"
      responses:
        "201":
          description: Habit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /habits/{habitId}:
    get:
      operationId: getHabit
      tags: [habits]
      summary: Get a single habit with all logs for current year
      parameters:
        - name: habitId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Habit detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HabitDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateHabit
      tags: [habits]
      summary: Update a habit
      parameters:
        - name: habitId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHabitBody"
      responses:
        "200":
          description: Updated habit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteHabit
      tags: [habits]
      summary: Delete a habit
      parameters:
        - name: habitId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # LOGS
  /habits/{habitId}/logs/{date}:
    put:
      operationId: upsertLog
      tags: [logs]
      summary: Log or update a day entry (YYYY-MM-DD)
      parameters:
        - name: habitId
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertLogBody"
      responses:
        "200":
          description: Log saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HabitLog"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteLog
      tags: [logs]
      summary: Remove a day log entry
      parameters:
        - name: habitId
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ADMIN
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/approve:
    post:
      operationId: approveUser
      tags: [admin]
      summary: Approve a pending user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/reject:
    post:
      operationId: rejectUser
      tags: [admin]
      summary: Reject / deactivate a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}:
    delete:
      operationId: deleteUser
      tags: [admin]
      summary: Permanently delete a user and their data
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error deleting user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
      required:
        - email
        - password
        - name

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [pending, active, rejected]
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string
      required:
        - id
        - email
        - name
        - status
        - role
        - createdAt

    HabitOption:
      type: object
      properties:
        label:
          type: string
        color:
          type: string
        isPositive:
          type: boolean
        isNegative:
          type: boolean
      required:
        - label
        - color
        - isPositive
        - isNegative

    Habit:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        emoji:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/HabitOption"
        createdAt:
          type: string
      required:
        - id
        - userId
        - name
        - emoji
        - options
        - createdAt

    HabitLog:
      type: object
      properties:
        habitId:
          type: string
        date:
          type: string
        optionIndex:
          type: integer
      required:
        - habitId
        - date
        - optionIndex

    HabitDetail:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        emoji:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/HabitOption"
        createdAt:
          type: string
        logs:
          type: array
          items:
            $ref: "#/components/schemas/HabitLog"
      required:
        - id
        - userId
        - name
        - emoji
        - options
        - createdAt
        - logs

    CreateHabitBody:
      type: object
      properties:
        name:
          type: string
        emoji:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/HabitOption"
      required:
        - name
        - emoji
        - options

    UpdateHabitBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        emoji:
          type: ["string", "null"]
        options:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/HabitOption"

    UpsertLogBody:
      type: object
      properties:
        optionIndex:
          type: integer
      required:
        - optionIndex
